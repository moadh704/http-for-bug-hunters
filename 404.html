<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | HTTP for Bug Hunters</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
            padding: 2rem;
        }
        h1 {
            font-size: 6rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: var(--text-dim);
        }
        .btn {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="btn">Back to Homepage</a>
    </div>
</body>
</html>
